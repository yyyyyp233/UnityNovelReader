name: Bug report
description: Report a reproducible Unity Novel Reader problem.
title: "[Bug] "
labels:
  - bug
body:
  - type: input
    id: unity-version
    attributes:
      label: Unity version
      placeholder: 2022.3.62f2
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Do not attach copyrighted book files. Use a minimal original sample if text content matters.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
